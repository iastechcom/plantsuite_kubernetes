namespace: plantsuite

labels:
  - pairs:
      app: gateway
      app.kubernetes.io/name: gateway
    includeSelectors: true
    includeTemplates: true

resources:
  - deployment.yaml
  - pvc.yaml
  - virtualservice.yaml
  - pdb.yaml
  - service.yaml

secretGenerator:
  - name: plantsuite-gateway-env
    envs:
      - appsettings.env

configMapGenerator:
  - name: gateway-appsettings
    files:
      - appsettings.json

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: plantsuite.azurecr.io/plantsuite-gateway
    newTag: pr-1014.5
  - name: plantsuite.azurecr.io/plantsuite-gateway-ui
    newTag: pr-1014.5
