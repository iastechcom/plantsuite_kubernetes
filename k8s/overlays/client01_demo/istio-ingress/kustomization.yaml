namespace: istio-ingress

resources:
  - ../../../base/istio-ingress

patches:
  - path: patches/hpa-ops.yaml
    target:
      kind: HorizontalPodAutoscaler
      name: gateway
  - path: patches/gateway-deployment-ops.yaml
    target:
      kind: Deployment
      name: gateway
  - path: patches/gateway-hosts.yaml
    target:
      kind: Gateway
      name: gateway
  - path: patches/wildcard-cert-hosts.yaml
    target:
      kind: Certificate
      name: plantsuite-wildcard
  - path: patches/mqtt-cert-hosts.yaml
    target:
      kind: Certificate
      name: plantsuite-mqtt
