namespace: plantsuite

resources:
  - ../../../../base/plantsuite/portal

patches:
  - target:
      kind: Deployment
      name: portal
    path: patches/deployment-ops.yaml
  - path: patches/virtualservice-portal.yaml
    target:
      kind: VirtualService
      name: portal
  - path: patches/configmap-appsettings.yaml
    target:
      kind: ConfigMap
      name: portal-appsettings
